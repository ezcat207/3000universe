<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO ROI Keyword Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --surface-hover: rgba(51, 65, 85, 0.8);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: rgba(255,255,255,0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
            background-attachment: fixed;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem 2rem;
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            display: flex;
            gap: 2rem;
            color: var(--text-secondary);
        }
        .stats span {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .search-box {
            flex-grow: 1;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface-color);
            color: white;
            font-size: 1rem;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        select, button {
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface-color);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }

        select:focus, button:hover {
            outline: none;
            border-color: var(--accent-primary);
        }

        /* Column Selector Plugin */
        .column-settings {
            position: relative;
        }
        
        .column-settings-btn {
            background-color: #1e293b;
            color: #38bdf8;
            border: 1px solid #38bdf8;
            font-weight: 500;
        }

        .column-settings-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 10px;
            background: #1e293b;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            width: 300px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 50;
            backdrop-filter: blur(20px);
            max-height: 400px;
            overflow-y: auto;
        }

        .column-settings-menu.visible {
            display: block;
            animation: fadeIn 0.2s ease forwards;
        }

        .col-option {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: var(--text-primary);
            cursor: pointer;
        }

        .col-option input {
            margin-right: 10px;
            accent-color: var(--accent-primary);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .table-container {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow-x: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            height: calc(100vh - 220px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        
        thead th {
            position: sticky;
            top: 0;
            background: #1e293b;
            z-index: 10;
        }

        th {
            padding: 1rem 1.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            transition: color 0.2s;
        }

        th:hover {
            color: var(--text-primary);
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.95rem;
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Make text cells truncatable */
        .truncate-text {
            max-width: 250px;
            display: inline-block;
            overflow: hidden;
            text-overflow: ellipsis;
            vertical-align: middle;
        }

        tr {
            transition: background 0.2s ease;
            cursor: pointer;
        }

        tr:hover {
            background: var(--surface-hover);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .keyword {
            font-weight: 600;
            color: #60a5fa;
        }

        .roi-high { color: var(--success); font-weight: 700; }
        .roi-mid { color: var(--warning); }
        .roi-low { color: var(--danger); }
        
        .kd-low { color: var(--success); }
        .kd-mid { color: var(--warning); }
        .kd-high { color: var(--danger); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            padding: 2rem;
            align-items: center;
            justify-content: center;
        }

        .modal.visible {
            display: flex;
            animation: fadeIn 0.2s ease forwards;
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            margin: 0;
            color: #60a5fa;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #fff;
        }

        .modal-body {
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .detail-group {
            background: rgba(15, 23, 42, 0.5);
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .detail-group.full-width {
            grid-column: 1 / -1;
        }

        .detail-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .detail-value {
            color: var(--text-primary);
            font-size: 1.05rem;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div id="listView">
    <div class="header">

        <h1>SEO Oracle Dashboard</h1>
        <div class="stats">
            <div>Processed Keywords: <span id="total-count">0</span></div>
            <div>Positive ROI: <span id="positive-count">0</span></div>
        </div>
    </div>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search keywords..." oninput="filterData()">
        </div>
        <select id="roiFilter" onchange="filterData()">
            <option value="all">All ROI</option>
            <option value="positive" selected>ROI > 0%</option>
            <option value="high">ROI > 1000%</option>
        </select>
        <select id="kdFilter" onchange="filterData()">
            <option value="all">All KD</option>
            <option value="low">KD 0-15</option>
            <option value="mid">KD 16-30</option>
            <option value="high">KD 31+</option>
        </select>
        
        <div class="column-settings">
            <button class="column-settings-btn" onclick="toggleColMenu()">⚙️ Columns</button>
            <div id="colMenu" class="column-settings-menu">
                <div style="margin-bottom: 10px; font-size: 13px; color: #94a3b8;">Select fields to display:</div>
                <div id="colCheckboxes"></div>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead id="tableHead">
                <!-- Headers rendered dynamically -->
            </thead>
            <tbody id="tableBody">
                <!-- Data rendered dynamically -->
            </tbody>
        </table>
    </div>

    <!-- Modal -->
    <div id="detailModal" class="modal" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="mKeyword">Keyword Details</h2>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    
    <script>
        let rawData = [];
        let filteredData = [];
        let activeColumns = {};
        let currentSort = { column: 'roi', desc: true };

        // Define all available columns and their default visibility
        const columns = [

            { id: 'keyword', title: 'Keyword ↕', default: true },
            { id: 'volume', title: 'Vol ↕', default: true },
            { id: 'kd', title: 'KD ↕', default: true },
            { id: 'cpc', title: 'CPC ↕', default: true },
            { id: 'req_links', title: 'Req Links ↕', default: true },
            { id: 'link_cost', title: 'Investment ↕', default: true },
            { id: 'annual_rev', title: 'Est. ARR ↕', default: true },
            { id: 'roi', title: 'ROI % ↕', default: true },
            { id: 'intent', title: 'Intent', default: true },
            { id: 'route', title: 'Route', default: false },
            { id: 'value', title: 'Search Val ↕', default: false },
            { id: 'type', title: 'Type', default: false },
            { id: 'trend', title: 'Trend', default: false },
            { id: 'trend_yearly', title: 'YoY Trend % ↕', default: false },
            { id: 'competition', title: 'Ads Comp', default: false },
            { id: 'avg_ref_domains', title: 'Avg Ref Dom', default: false },
            { id: 'main_domain_rank', title: 'Main Dom Rank', default: false },
            { id: 'meaning', title: 'Meaning (AI)', default: false },
            { id: 'user_need', title: 'User Need (AI)', default: false },
            { id: 'hypothesis', title: 'Hypothesis (AI)', default: false },
            { id: 'route_reason', title: 'Route Rsn (AI)', default: false },
            { id: 'serp_reason', title: 'SERP Fit Rsn (AI)', default: false }
        ];

        // Currently active columns map
        let activeColumns = {};
        columns.forEach(c => activeColumns[c.id] = c.default);

        let currentSort = { column: 'roi', desc: true };
        let filteredData = [...rawData];

        // Formatters
        const isNum = (n) => !isNaN(parseFloat(n)) && isFinite(n);
        function formatVal(val, colId) {
            if (val === null || val === undefined || val === '') return '-';
            
            if (colId === 'cpc' || colId === 'link_cost' || colId === 'annual_rev') {
                return '$' + parseFloat(val).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
            }
            if (colId === 'roi') {
                return val >= 9999 ? '>9999%' : parseFloat(val).toLocaleString('en-US', {maximumFractionDigits: 0}) + '%';
            }
            if (colId === 'trend_yearly') {
                return parseFloat(val) + '%';
            }
            if (['volume', 'value', 'avg_ref_domains', 'main_domain_rank', 'req_links'].includes(colId)) {
                return isNum(val) ? parseFloat(val).toLocaleString('en-US') : val;
            }
            
            // For long text fields, wrap in a title attribute + truncate class
            if (typeof val === 'string' && val.length > 30 && ['meaning', 'user_need', 'hypothesis', 'route_reason', 'serp_reason'].includes(colId)) {
                return `<span class="truncate-text" title="${val.replace(/"/g, '&quot;')}">${val}</span>`;
            }
            return val;
        }

        // Setup Column Menu
        function setupColumnMenu() {
            const container = document.getElementById('colCheckboxes');
            columns.forEach(col => {
                const checked = activeColumns[col.id] ? 'checked' : '';
                container.innerHTML += `
                    <label class="col-option">
                        <input type="checkbox" value="${col.id}" ${checked} onchange="updateColumns(this)">
                        ${col.title.replace(' ↕','')}
                    </label>
                `;
            });
        }

        function toggleColMenu() {
            document.getElementById('colMenu').classList.toggle('visible');
        }

        function updateColumns(checkbox) {
            activeColumns[checkbox.value] = checkbox.checked;
            renderTable();
        }

        // Hide menu on outside click
        window.addEventListener('click', function(e) {
            const menu = document.getElementById('colMenu');
            const btn = document.querySelector('.column-settings-btn');
            if (menu.classList.contains('visible') && !menu.contains(e.target) && e.target !== btn) {
                menu.classList.remove('visible');
            }
        });

        function renderTable() {
            // Render Headers
            const thead = document.getElementById('tableHead');
            let headHTML = '<tr>';
            columns.forEach(col => {
                if (activeColumns[col.id]) {
                    headHTML += `<th onclick="sortBy('${col.id}')">${col.title}</th>`;
                }
            });
            headHTML += '</tr>';
            thead.innerHTML = headHTML;

            // Render Body
            const tbody = document.getElementById('tableBody');
            let bodyHTML = '';
            let posCount = 0;
            
            filteredData.forEach((row, index) => {
                if (row.roi > 0) posCount++;
                
                bodyHTML += `<tr onclick="showDetail(${index})">`;
                columns.forEach(col => {
                    if (activeColumns[col.id]) {
                        let className = '';
                        if (col.id === 'roi') {
                            className = row.roi > 500 ? 'roi-high' : (row.roi < 0 ? 'roi-low' : 'roi-mid');
                        } else if (col.id === 'kd') {
                            className = row.kd <= 15 ? 'kd-low' : (row.kd > 30 ? 'kd-high' : 'kd-mid');
                        } else if (col.id === 'keyword') {
                            className = 'keyword';
                        }
                        
                        let cellContent = formatVal(row[col.id], col.id);
                        if (col.id === 'annual_rev') {
                            cellContent = `<span style="color: #60a5fa">${cellContent}</span>`;
                        }
                        if (col.id === 'intent' || col.id === 'type') {
                            cellContent = `<span style="text-transform: capitalize; color: #94a3b8">${cellContent}</span>`;
                        }

                        bodyHTML += `<td class="${className}">${cellContent}</td>`;
                    }
                });
                bodyHTML += '</tr>';
            });
            
            tbody.innerHTML = bodyHTML;

            document.getElementById('total-count').textContent = filteredData.length;
            document.getElementById('positive-count').textContent = posCount;
        }

        function filterData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const roiF = document.getElementById('roiFilter').value;
            const kdF = document.getElementById('kdFilter').value;

            filteredData = rawData.filter(row => {
                // Search across commonly searched text fields
                const searchStr = `${row.keyword} ${row.intent} ${row.user_need} ${row.hypothesis} ${row.meaning} ${row.route}`.toLowerCase();
                if (!searchStr.includes(search)) return false;

                // ROI filter
                if (roiF === 'positive' && row.roi <= 0) return false;
                if (roiF === 'high' && row.roi <= 1000) return false;

                // KD filter
                if (kdF === 'low' && row.kd > 15) return false;
                if (kdF === 'mid' && (row.kd <= 15 || row.kd > 30)) return false;
                if (kdF === 'high' && row.kd <= 30) return false;

                return true;
            });

            doSort();
            renderTable();
        }

        function sortBy(column) {
            if (currentSort.column === column) {
                currentSort.desc = !currentSort.desc;
            } else {
                currentSort.column = column;
                currentSort.desc = true;
            }
            doSort();
            renderTable();
        }

        function doSort() {
            filteredData.sort((a, b) => {
                let valA = a[currentSort.column] !== null ? a[currentSort.column] : '';
                let valB = b[currentSort.column] !== null ? b[currentSort.column] : '';
                
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                
                // Keep empty values at bottom regardless of sort direction
                if (valA === '' || valA === '-') return 1;
                if (valB === '' || valB === '-') return -1;
                
                if (valA < valB) return currentSort.desc ? 1 : -1;
                if (valA > valB) return currentSort.desc ? -1 : 1;
                return 0;
            });
        }

        
        // Detail View functions
        function showList() {
            document.getElementById('detailView').style.display = 'none';
            document.getElementById('listView').style.display = 'block';
        }

        function showDetail(index) {
            const row = filteredData[index];
            document.getElementById('listView').style.display = 'none';
            document.getElementById('detailView').style.display = 'block';
            window.scrollTo(0, 0);

            const kdClass = row.kd<=15?'text-green':(row.kd>30?'text-red':'text-yellow');
            const roiClass = row.roi>500?'text-green':(row.roi<0?'text-red':'text-yellow');
            const kdSub = row.kd<=15?'VERY EASY':(row.kd>30?'HARD':'MEDIUM');
            const roiSub = row.roi>500?'EXTREME':(row.roi>100?'GOOD':(row.roi<0?'POOR':'LOW'));
            
            const formatShort = (num) => {
                if(!num) return '0';
                let n = parseInt(num);
                if(n >= 1000000) return (n/1000000).toFixed(2).replace(/\.00$/,'') + 'M';
                if(n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
                return n.toLocaleString();
            };
            const formatMoney = (num) => {
                if(!num) return '$0';
                let n = typeof num==='string' ? parseFloat(num.replace('$','')) : num;
                if(n >= 1000000) return '$' + (n/1000000).toFixed(2).replace(/\.00$/,'') + 'M';
                if(n >= 1000) return '$' + (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
                return '$' + n.toLocaleString();
            };

            const formatCard = (label, icon, val, valCls, sub, subCls) => `
                <div class="metric-card">
                    <div class="metric-card-top"><div class="label">${label}</div><div class="icon">${icon}</div></div>
                    <div class="metric-card-bottom"><div class="val ${valCls}">${val}</div>${sub?`<div class="sub-val ${subCls}">${sub}</div>`:''}</div>
                </div>`;

            let trendStr = (row.trend_yearly > 0 ? '+' : '') + parseFloat(row.trend_yearly).toLocaleString() + '%';
            let trendCls = row.trend_yearly > 0 ? 'text-green' : (row.trend_yearly < 0 ? 'text-red' : '');

            document.getElementById('detailHero').innerHTML = `
                <span class="root-badge">${row.keyword_root}</span>
                <span class="root-badge" style="background:rgba(16,185,129,0.15);color:#34d399;margin-left:8px">${row.batch}</span>
                <h2>${row.keyword}</h2>

                
                <div style="margin-top:2rem; margin-bottom: 2rem; display:flex; flex-direction:column; gap:1rem;">
                    
                    <div style="background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:1.2rem;">
                        <div style="display:flex; align-items:center; gap:8px; margin-bottom:0.75rem;">
                            <span style="font-size:1.1rem;">🧠</span>
                            <span style="font-size:0.75rem; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px;">Meaning (AI)</span>
                        </div>
                        <p style="font-size:1.05rem; font-weight:500; color:var(--text-primary); margin:0; line-height:1.5;">${row.meaning || '-'}</p>
                    </div>

                    <div style="background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:1.2rem;">
                        <div style="display:flex; align-items:center; gap:8px; margin-bottom:0.75rem;">
                            <span style="font-size:1.1rem;">👤</span>
                            <span style="font-size:0.75rem; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px;">User Need (AI)</span>
                        </div>
                        <p style="font-size:0.95rem; color:var(--text-primary); margin:0; line-height:1.5;">${row.user_need || '-'}</p>
                    </div>

                    <div style="background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:1.2rem;">
                        <div style="display:flex; align-items:center; gap:8px; margin-bottom:0.75rem;">
                            <span style="font-size:1.1rem;">💡</span>
                            <span style="font-size:0.75rem; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px;">Hypothesis (AI)</span>
                        </div>
                        <p style="font-size:0.95rem; color:var(--text-primary); margin:0; line-height:1.5;">${row.hypothesis || '-'}</p>
                    </div>

                    <div style="background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:1.2rem;">
                        <div style="display:flex; align-items:center; gap:8px; margin-bottom:0.75rem;">
                            <span style="font-size:1.1rem;">🎯</span>
                            <span style="font-size:0.75rem; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px;">SERP Fit Reason</span>
                        </div>
                        <p style="font-size:0.95rem; color:var(--text-primary); margin:0; line-height:1.5;">${row.serp_reason || '-'}</p>
                    </div>

                </div>


                <div class="metric-grid">
                    ${formatCard('Volume', '📊', formatShort(row.volume), 'text-blue', trendStr, trendCls)}
                    ${formatCard('KD', '🎯', row.kd||'-', kdClass, kdSub, kdClass)}
                    ${formatCard('CPC', '💵', row.cpc?'$'+row.cpc:'$0', '', (row.competition||'Unknown').toUpperCase(), '')}
                    ${formatCard('ROI', '🚀', row.roi>=9999?'>9999%':Math.round(row.roi)+'%', roiClass, roiSub, roiClass)}
                    ${formatCard('Investment', '💳', formatMoney(row.link_cost), '', row.req_links+' Links req', '')}
                    ${formatCard('Est. ARR', '💰', formatMoney(row.annual_rev), 'text-blue', '', '')}
                    ${formatCard('GT Value', '🔥', row.value||0, 'text-blue', row.type||'-', '')}
                    ${formatCard('趋势', '📉', row.trend||'-', '', '', '')}
                    ${formatCard('Intent', '🧠', row.intent||'-', '', '', '')}
                    ${formatCard('Route', '🛣️', row.route||'-', '', '', '')}
                    ${formatCard('Ads Comp', '🏷️', row.competition||'-', '', '', '')}
                    ${formatCard('Avg Ref Doms', '🌐', formatShort(row.avg_ref_domains), '', '', '')}
                    ${formatCard('Backlinks', '🔗', formatShort(row.bl_backlinks), '', formatShort(row.bl_dofollow)+' DoFollow', '')}
                    ${formatCard('Ref Domains', '🌐', formatShort(row.bl_ref_domains), '', '', '')}
                </div>`;
        }


        // Fetch data on load
        async function loadData() {
            try {
                const response = await fetch('dashboard_data.json');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                rawData = await response.json();
                
                // Keep only the most recent batch initially
                if (rawData.length > 0) {
                    const latestBatch = [...new Set(rawData.map(r => r.batch))].sort().reverse()[0];
                    filteredData = rawData; // Temporarily need full data to populate filters
                    populateFilters();
                    
                    // Now set initial filter to latest batch
                    document.getElementById('batchFilter').value = latestBatch;
                    filterData(); // This will apply the filter and render
                }
            } catch (err) {
                console.error("Failed to load dashboard data:", err);
                // Fallback for local files without local server due to CORS
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="10" style="text-align:center; padding: 3rem; color:#f87171;"><h2>Data Could Not Be Loaded</h2><p>If you opened this HTML file directly from your hard drive, your browser blocked the data file for security reasons (CORS).</p><p>To view it locally, please run a local web server (e.g. <code>python3 -m http.server</code>) or view it on Vercel!</p></td></tr>';
            }
        }

        document.addEventListener('keydown', function(event){
            if(event.key === "Escape"){
                closeModal();
            }
        });

        // Initialize
        setupColumnMenu();
        
        // Load data asynchronously (which will trigger filterData and renderTable once complete)
        document.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
