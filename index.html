<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Oracle Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --surface-hover: rgba(51, 65, 85, 0.8);
            --surface-solid: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: rgba(255,255,255,0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
        body {
            background-color: var(--bg-color); color: var(--text-primary);
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(59,130,246,0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16,185,129,0.15), transparent 25%);
            background-attachment: fixed;
        }

        /* ===== LIST VIEW ===== */
        #listView { padding: 2rem; }
        .header {
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:2rem; padding:1.5rem 2rem;
            background:var(--surface-color); backdrop-filter:blur(12px);
            border:1px solid var(--border); border-radius:16px;
            box-shadow:0 8px 32px rgba(0,0,0,0.2);
        }
        h1 {
            font-size:24px; font-weight:600;
            background:linear-gradient(to right,#60a5fa,#34d399);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .stats { display:flex; gap:2rem; color:var(--text-secondary); }
        .stats span { color:var(--text-primary); font-weight:600; font-size:1.1rem; }
        .controls { display:flex; gap:1rem; margin-bottom:1rem; flex-wrap:wrap; }
        .search-box { flex-grow:1; position:relative; }
        .search-box input {
            width:100%; padding:12px 20px; border-radius:12px;
            border:1px solid var(--border); background:var(--surface-color);
            color:white; font-size:1rem; backdrop-filter:blur(12px);
            transition:all 0.3s ease;
        }
        .search-box input:focus { outline:none; border-color:var(--accent-primary); box-shadow:0 0 15px var(--accent-glow); }
        select, button {
            padding:12px 20px; border-radius:12px; border:1px solid var(--border);
            background:var(--surface-color); color:white; font-size:1rem;
            cursor:pointer; backdrop-filter:blur(12px); transition:all 0.3s ease;
        }
        select:focus, button:hover { outline:none; border-color:var(--accent-primary); }
        .column-settings { position:relative; }
        .column-settings-btn { background-color:#1e293b; color:#38bdf8; border:1px solid #38bdf8; font-weight:500; }
        .column-settings-menu {
            display:none; position:absolute; top:100%; right:0; margin-top:10px;
            background:#1e293b; border:1px solid var(--border); border-radius:12px;
            padding:1rem; width:300px; box-shadow:0 10px 40px rgba(0,0,0,0.5);
            z-index:50; max-height:400px; overflow-y:auto;
        }
        .column-settings-menu.visible { display:block; animation:fadeIn 0.2s ease forwards; }
        .col-option { display:flex; align-items:center; margin-bottom:8px; font-size:0.95rem; color:var(--text-primary); cursor:pointer; }
        .col-option input { margin-right:10px; accent-color:var(--accent-primary); width:16px; height:16px; cursor:pointer; }
        .table-container {
            background:var(--surface-color); backdrop-filter:blur(12px);
            border:1px solid var(--border); border-radius:16px;
            overflow-x:auto; box-shadow:0 8px 32px rgba(0,0,0,0.2);
            height:calc(100vh - 220px);
        }
        table { width:100%; border-collapse:collapse; text-align:left; }
        thead th { position:sticky; top:0; background:#1e293b; z-index:10; }
        th {
            padding:1rem 1.5rem; color:var(--text-secondary); font-weight:500;
            font-size:0.9rem; text-transform:uppercase; letter-spacing:0.5px;
            border-bottom:1px solid var(--border); cursor:pointer; user-select:none;
            white-space:nowrap; transition:color 0.2s;
        }
        th:hover { color:var(--text-primary); }
        td {
            padding:1.25rem 1.5rem; border-bottom:1px solid rgba(255,255,255,0.05);
            font-size:0.95rem; max-width:300px; white-space:nowrap;
            overflow:hidden; text-overflow:ellipsis;
        }
        .truncate-text { max-width:250px; display:inline-block; overflow:hidden; text-overflow:ellipsis; vertical-align:middle; }
        tr { transition:background 0.2s ease; cursor:pointer; }
        tr:hover { background:var(--surface-hover); }
        .keyword { font-weight:600; color:#60a5fa; }
        .roi-high { color:var(--success); font-weight:700; }
        .roi-mid { color:var(--warning); }
        .roi-low { color:var(--danger); }
        .kd-low { color:var(--success); }
        .kd-mid { color:var(--warning); }
        .kd-high { color:var(--danger); }

        /* ===== DETAIL VIEW ===== */
        #detailView { display:none; padding:2rem; max-width:1200px; margin:0 auto; }
        .back-btn {
            display:inline-flex; align-items:center; gap:8px;
            padding:10px 24px; border-radius:12px; border:1px solid var(--border);
            background:var(--surface-color); color:#60a5fa; font-size:1rem;
            cursor:pointer; transition:all 0.2s; margin-bottom:2rem;
        }
        .back-btn:hover { border-color:#60a5fa; background:rgba(96,165,250,0.1); }
        .detail-hero {
            background:var(--surface-color); backdrop-filter:blur(12px);
            border:1px solid var(--border); border-radius:16px;
            padding:2rem; margin-bottom:2rem;
        }
        .detail-hero h2 {
            font-size:2rem; margin-bottom:0.5rem;
            background:linear-gradient(to right,#60a5fa,#a78bfa);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .detail-hero .root-badge {
            display:inline-block; padding:4px 14px; border-radius:999px;
            background:rgba(59,130,246,0.15); color:#60a5fa; font-size:0.9rem;
            font-weight:500; margin-bottom:1rem;
        }
        .metric-grid {
            display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
            gap:1rem; margin-top:1.5rem;
        }
        @media(max-width: 768px) {
            .metric-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
            .metric-card { padding: 0.75rem; }
            .metric-card .val { font-size: 1.25rem; }
        }
        .metric-card {
            background:rgba(15,23,42,0.6); border:1px solid rgba(255,255,255,0.05);
            border-radius:12px; padding:1rem; text-align:center;
        }
        .metric-card .label { font-size:0.8rem; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.5rem; }
        .metric-card .val { font-size:1.5rem; font-weight:700; color:var(--text-primary); }
        .metric-card .val.green { color:var(--success); }
        .metric-card .val.yellow { color:var(--warning); }
        .metric-card .val.red { color:var(--danger); }
        .metric-card .val.blue { color:#60a5fa; }
        .metric-card { position:relative; }
        .info-icon {
            position:absolute; top:6px; right:6px; width:17px; height:17px;
            border-radius:50%; background:rgba(148,163,184,0.12); color:#64748b;
            font-size:10px; font-style:italic; font-weight:700;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; border:1px solid rgba(148,163,184,0.2);
            transition:all 0.2s; line-height:1; padding:0; flex-shrink:0;
        }
        .info-icon:hover, .info-icon.active {
            background:rgba(96,165,250,0.15); color:#60a5fa;
            border-color:rgba(96,165,250,0.35);
        }
        .metric-tooltip {
            display:none; position:absolute; bottom:calc(100% + 10px);
            left:50%; transform:translateX(-50%);
            background:#1e293b; border:1px solid rgba(255,255,255,0.12);
            border-radius:10px; padding:10px 14px;
            font-size:0.78rem; color:#cbd5e1; line-height:1.55;
            width:230px; z-index:200; pointer-events:none;
            box-shadow:0 8px 24px rgba(0,0,0,0.5);
            white-space:normal; text-align:left;
            font-style:normal; font-weight:400;
        }
        .metric-tooltip::after {
            content:''; position:absolute; top:100%; left:50%;
            transform:translateX(-50%);
            border:6px solid transparent; border-top-color:#1e293b;
        }
        .info-icon:hover .metric-tooltip,
        .info-icon.active .metric-tooltip { display:block; }

        .chart-section {
            display:grid; grid-template-columns:2fr 1fr; gap:2rem; margin-bottom:2rem;
        }
        @media(max-width:900px) { .chart-section { grid-template-columns:1fr; } }
        .chart-card {
            background:var(--surface-color); backdrop-filter:blur(12px);
            border:1px solid var(--border); border-radius:16px; padding:1.5rem;
        }
        .chart-card h3 { font-size:1.1rem; color:var(--text-primary); margin-bottom:1rem; }
        .chart-card canvas { width:100% !important; max-height:300px; }

        .ai-section {
            display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:2rem;
        }
        @media(max-width:768px) { .ai-section { grid-template-columns:1fr; } }
        .ai-card {
            background:var(--surface-color); backdrop-filter:blur(12px);
            border:1px solid var(--border); border-radius:16px; padding:1.5rem;
        }
        .ai-card.full-width { grid-column:1 / -1; }
        .ai-card h3 {
            font-size:0.85rem; color:var(--text-secondary); text-transform:uppercase;
            letter-spacing:0.5px; margin-bottom:0.75rem;
        }
        .ai-card p { color:var(--text-primary); font-size:1rem; line-height:1.7; }

        @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
        ::-webkit-scrollbar { width:8px; height:8px; }
        ::-webkit-scrollbar-track { background:rgba(255,255,255,0.05); border-radius:4px; }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:4px; }
        ::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.3); }
        .calc-section { margin-top: 2rem; padding: 2rem; background: var(--surface-color); border: 1px solid var(--border); border-radius: 16px; backdrop-filter: blur(12px); }
        .calc-header { margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
        .calc-header h3 { font-size: 1.25rem; color: var(--text-primary); }
        .calc-header a { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; padding: 6px 16px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        @media(max-width:768px) { .calc-grid { grid-template-columns: 1fr; } }
        .calc-input-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-secondary); }
        .calc-input-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.8); color: white; font-size: 1rem; transition: border-color 0.2s; }
        .calc-input-group input:focus { outline: none; border-color: #3b82f6; }
        .calc-input-group input[readonly] { color: #94a3b8; cursor: not-allowed; }
        .calc-btn { width: 100%; padding: 14px; background: rgba(59,130,246,0.1); border: 1px solid #3b82f6; color: #3b82f6; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .calc-btn:hover { background: rgba(59,130,246,0.2); }
        .calc-results { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-top: 2rem; display: none; }
        @media(max-width:768px) { .calc-results { grid-template-columns: 1fr; } }
        .calc-result-card { background: rgba(15,23,42,0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 1.5rem; }
        .calc-result-card h4 { color: #60a5fa; margin-bottom: 1rem; font-size: 1rem; }
        .calc-formula { font-family: monospace; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 1rem; line-height: 1.6; }
        .calc-val { font-size: 1.8rem; font-weight: 700; color: white; margin-bottom: 1rem; }
        .calc-rec { padding: 8px 12px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; text-align: center; }
        .rec-good { background: rgba(16,185,129,0.15); color: #34d399; }
        .rec-mid { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .rec-bad { background: rgba(239,68,68,0.15); color: #f87171; }

    </style>
</head>
<body>

<!-- ===== LIST VIEW ===== -->
<div id="listView">
    <div class="header">
        <h1>SEO Oracle Dashboard</h1>
        <div class="stats">
            <div>Processed Keywords: <span id="total-count">0</span></div>
            <div>Positive ROI: <span id="positive-count">0</span></div>
        </div>
    </div>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search keywords, roots, intent..." oninput="filterData()">
        </div>
        <select id="batchFilter" onchange="filterData()">
            <option value="all">All Batches</option>
        </select>
        <select id="rootFilter" onchange="filterData()">
            <option value="all">All Roots</option>
        </select>
        <select id="roiFilter" onchange="filterData()">
            <option value="all">All ROI</option>
            <option value="positive" selected>ROI > 0%</option>
            <option value="high">ROI > 1000%</option>
        </select>
        <select id="kdFilter" onchange="filterData()">
            <option value="all">All KD</option>
            <option value="low">KD 0-15</option>
            <option value="mid">KD 16-30</option>
            <option value="high">KD 31+</option>
        </select>
        <div class="column-settings">
            <button class="column-settings-btn" onclick="toggleColMenu()">⚙️ Columns</button>
            <div id="colMenu" class="column-settings-menu">
                <div style="margin-bottom:10px;font-size:13px;color:#94a3b8;">Select fields to display:</div>
                <div id="colCheckboxes"></div>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div id="pagination" style="display:flex;align-items:center;justify-content:center;gap:1.5rem;padding:1rem 0;"></div>
</div>

<!-- ===== DETAIL VIEW ===== -->
<div id="detailView">
    <button class="back-btn" onclick="showList()">← Back to Dashboard</button>
    <div class="detail-hero" id="detailHero"></div>
    <div class="ai-section" id="aiSection"></div>
    <div class="chart-section" id="chartSection">
        <div class="chart-card"><h3>📈 Monthly Search Volume</h3><canvas id="volChart"></canvas></div>
        <div class="chart-card"><h3>💰 ROI Breakdown</h3><canvas id="roiChart"></canvas></div>
    </div>
    <div class="calc-section" id="calcSection"></div>
</div>


<script>
    let rawData = [];

    const columns = [
        { id:'batch', title:'Batch ↕', default:false },
        { id:'keyword_root', title:'Root ↕', default:true },
        { id:'keyword', title:'Keyword ↕', default:true },
        { id:'volume', title:'Vol ↕', default:true },
        { id:'kd', title:'KD ↕', default:true },
        { id:'cpc', title:'CPC ↕', default:true },
        { id:'req_links', title:'Req Links ↕', default:true },
        { id:'link_cost', title:'Investment ↕', default:true },
        { id:'annual_rev', title:'Est. ARR ↕', default:true },
        { id:'roi', title:'ROI % ↕', default:true },
        { id:'intent', title:'Intent', default:true },
        { id:'route', title:'Route', default:true },
        { id:'klass', title:'Class', default:false },
        { id:'serp_fit', title:'SERP Fit', default:false },
        { id:'value', title:'Search Val ↕', default:false },
        { id:'type', title:'Type', default:false },
        { id:'trend', title:'Trend', default:false },
        { id:'trend_yearly', title:'YoY % ↕', default:false },
        { id:'competition', title:'Ads Comp', default:false },
        { id:'avg_ref_domains', title:'Avg Ref Dom', default:false },
        { id:'main_domain_rank', title:'Main Dom Rank', default:false },
        { id:'meaning', title:'Meaning (AI)', default:false },
        { id:'user_need', title:'User Need (AI)', default:false },
        { id:'hypothesis', title:'Hypothesis (AI)', default:false },
        { id:'serp_reason', title:'SERP Fit Rsn', default:false },
        { id:'serp_evidence', title:'SERP Evidence', default:false },
        { id:'route_reason', title:'Route Rsn', default:false },
        { id:'offer_examples', title:'Offer Examples', default:false }
    ];

    let activeColumns = {};
    columns.forEach(c => activeColumns[c.id] = c.default);
    let currentSort = { column:'roi', desc:true };
    let filteredData = [...rawData];
    let currentPage = 1;
    let totalRows = 0;
    let positiveTotal = 0;
    const PAGE_SIZE = 100;
    let volChartInstance = null;
    let roiChartInstance = null;

    const isNum = (n) => !isNaN(parseFloat(n)) && isFinite(n);

    function formatVal(val, colId) {
        if (val === null || val === undefined || val === '') return '-';
        if (['cpc','link_cost','annual_rev'].includes(colId))
            return '$' + parseFloat(val).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
        if (colId === 'roi')
            return val >= 9999 ? '>9999%' : parseFloat(val).toLocaleString('en-US',{maximumFractionDigits:0}) + '%';
        if (colId === 'trend_yearly') return parseFloat(val) + '%';
        if (['volume','value','avg_ref_domains','main_domain_rank','req_links'].includes(colId))
            return isNum(val) ? parseFloat(val).toLocaleString('en-US') : val;
        const longFields = ['meaning','user_need','hypothesis','route_reason','serp_reason','serp_evidence','offer_examples'];
        if (typeof val === 'string' && val.length > 40 && longFields.includes(colId))
            return `<span class="truncate-text" title="${val.replace(/"/g,'&quot;')}">${val}</span>`;
        return val;
    }

    function setupColumnMenu() {
        const c = document.getElementById('colCheckboxes');
        columns.forEach(col => {
            c.innerHTML += `<label class="col-option"><input type="checkbox" value="${col.id}" ${activeColumns[col.id]?'checked':''} onchange="updateColumns(this)">${col.title.replace(' ↕','')}</label>`;
        });
    }
    function toggleColMenu() { document.getElementById('colMenu').classList.toggle('visible'); }
    function updateColumns(cb) { activeColumns[cb.value] = cb.checked; renderTable(); }
    window.addEventListener('click', e => {
        const m = document.getElementById('colMenu'), b = document.querySelector('.column-settings-btn');
        if (m.classList.contains('visible') && !m.contains(e.target) && e.target !== b) m.classList.remove('visible');
    });

    function renderTable() {
        const thead = document.getElementById('tableHead');
        let headHTML = '<tr>';
        columns.forEach(c => { if (activeColumns[c.id]) headHTML += `<th onclick="sortBy('${c.id}')">${c.title}</th>`; });
        headHTML += '</tr>';
        thead.innerHTML = headHTML;

        const tbody = document.getElementById('tableBody');
        let bodyHTML = '';
        filteredData.forEach((row, i) => {
            bodyHTML += `<tr onclick="showDetail(${i})">`;
            columns.forEach(c => {
                if (activeColumns[c.id]) {
                    let cls = '';
                    if (c.id==='roi') cls = row.roi>500?'roi-high':(row.roi<0?'roi-low':'roi-mid');
                    else if (c.id==='kd') cls = row.kd<=15?'kd-low':(row.kd>30?'kd-high':'kd-mid');
                    else if (c.id==='keyword') cls = 'keyword';
                    let cell = formatVal(row[c.id], c.id);
                    if (c.id==='annual_rev') cell = `<span style="color:#60a5fa">${cell}</span>`;
                    if (c.id==='intent'||c.id==='type') cell = `<span style="text-transform:capitalize;color:#94a3b8">${cell}</span>`;
                    bodyHTML += `<td class="${cls}">${cell}</td>`;
                }
            });
            bodyHTML += '</tr>';
        });
        tbody.innerHTML = bodyHTML;
        document.getElementById('total-count').textContent = totalRows.toLocaleString();
        document.getElementById('positive-count').textContent = positiveTotal.toLocaleString();
    }

    function filterData() { currentPage = 1; fetchData(); }

    function sortBy(col) {
        currentSort.desc = currentSort.column === col ? !currentSort.desc : true;
        currentSort.column = col;
        fetchData();
    }

    // ===== METRIC CARD HELPER =====
    const MC_INFO = {
        'Volume':          'Monthly search volume — estimated number of searches per month on Google (source: DataForSEO). Higher volume = larger audience.',
        'KD':              'Keyword Difficulty (0–100) — how competitive page 1 is. Derived from the backlink strength of current top-10 results. Lower = easier to rank.',
        'CPC':             'Cost Per Click — average Google Ads bid for this keyword. Higher CPC signals strong commercial intent and monetization potential per visitor.',
        'ROI':             'Return on Investment — (Est. ARR − Investment) ÷ Investment × 100. Positive ROI means ranking pays back the link-building cost within one year.',
        'Investment':      'Estimated total link-building budget to reach page 1, calculated from required referring domains × average link cost ($100–$200 per link).',
        'Est. ARR':        'Estimated Annual Recurring Revenue — monthly volume × ~10% top-3 CTR × 12 months × assumed $1 revenue per organic visitor.',
        'Req Links':       'Required referring domains to reach page 1, estimated from the KD score. This is the number of unique sites that need to link to your page.',
        'GT Value':        'Google Trends interest score (0–100) at time of analysis. 100 = peak search interest. Relative, not absolute.',
        'GT Type':         '"rising" = rapidly growing search momentum — good timing to rank early. "top" = consistently high-volume, stable keyword.',
        'Intent':          'Search intent — what users want: informational (learn), commercial (compare), transactional (buy/sign up), navigational (find a specific site).',
        'Route':           'Recommended content type to target this keyword — e.g., blog post, landing page, comparison page, tool, or product page.',
        'YoY Trend':       'Year-over-Year change in search volume (%). Positive = growing market interest; negative = declining topic.',
        'Ads Comp':        'Advertiser competition density in Google Ads. High = many advertisers bidding, confirming strong commercial value.',
        'Avg Ref Domains': 'Average number of unique referring domains pointing to pages currently ranking in the top 10 for this keyword.',
        'Backlinks':       'Total backlink count of the average top-10 ranking page. More backlinks = stronger competition.',
        'DoFollow':        'DoFollow backlinks pass SEO authority (link juice) to the page. More impactful than nofollow links for ranking.',
        'Ref Domains':     'Number of unique root domains currently linking to this keyword\'s target page.',
    };
    function mc(label, val, cls, sty) {
        const tip = MC_INFO[label] || '';
        const clsStr = cls ? ` class="val ${cls}"` : ' class="val"';
        const styStr = sty ? ` style="${sty}"` : '';
        const btn = tip ? `<button class="info-icon" onclick="event.stopPropagation();this.classList.toggle('active')">i<span class="metric-tooltip">${tip}</span></button>` : '';
        return `<div class="metric-card"><div class="label">${label}</div><div${clsStr}${styStr}>${val}</div>${btn}</div>`;
    }

                ${mc('GT Type',         row.type||'-',                                            '', 'font-size:1rem;text-transform:capitalize')}
                ${mc('Intent',          row.intent||'-',                                          '', 'font-size:1rem;text-transform:capitalize')}
                ${mc('Route',           row.route||'-',                                           '', 'font-size:1rem')}
                ${mc('YoY Trend',       (row.trend_yearly||0)+'%')}
                ${mc('Ads Comp',        row.competition||'-',                                     '', 'font-size:1rem')}
                ${mc('Avg Ref Domains', (row.avg_ref_domains||0).toLocaleString())}
                ${mc('Backlinks',       (row.bl_backlinks||0).toLocaleString())}

            </div>`;

        // Charts
        buildVolChart(row);

    function calculateSEOBoxMetrics() {
        const intitleStr = document.getElementById('calcIntitle').value;
        if (!intitleStr) return alert("Please enter the Intitle count from Google!");
        const intitle = parseFloat(intitleStr);
        const searchVolume = parseFloat(document.getElementById('calcVol').value) || 1;
        const kd = parseFloat(document.getElementById('calcKd').value) || 0;

        document.getElementById('calcResults').style.display = 'grid';

        // 1. KGR
        const kgr = intitle / searchVolume;
        document.getElementById('kgrFormula').innerHTML = `intitle / volume<br>= ${intitle} / ${searchVolume}`;
        document.getElementById('kgrVal').textContent = kgr.toFixed(3);
        const kgrRec = document.getElementById('kgrRec');
        if (kgr < 0.25) { kgrRec.className='calc-rec rec-good'; kgrRec.textContent='Low Comp (Great)'; }
        else if (kgr <= 1.0) { kgrRec.className='calc-rec rec-mid'; kgrRec.textContent='Mid Comp (OK)'; }
        else { kgrRec.className='calc-rec rec-bad'; kgrRec.textContent='High Comp (Bad)'; }

        // 2. EKGR
        const kdFactor = 1 + (kd / 100);
        const ekgr = (intitle * kdFactor) / searchVolume;
        document.getElementById('ekgrFormula').innerHTML = `(intitle × (1 + KD/100)) / volume<br>= (${intitle} × ${kdFactor.toFixed(2)}) / ${searchVolume}`;
        document.getElementById('ekgrVal').textContent = ekgr.toFixed(3);
        const ekgrRec = document.getElementById('ekgrRec');
        if (ekgr < 0.25 && kd < 30) { ekgrRec.className='calc-rec rec-good'; ekgrRec.textContent='Low Comp + Easy'; }
        else if (ekgr <= 1.0 && kd <= 50) { ekgrRec.className='calc-rec rec-mid'; ekgrRec.textContent='Mid Comp'; }
        else { ekgrRec.className='calc-rec rec-bad'; ekgrRec.textContent='High Comp / Req. Resources'; }

        // 3. KDROI
        const kdToReferringDomains = {0:0, 10:10, 20:22, 30:36, 40:56, 50:84, 60:129, 70:202, 80:353, 90:756, 100:2000};
        const kdValues = Object.keys(kdToReferringDomains).map(Number);
        const lowerKd = Math.max(...kdValues.filter(k => k <= kd));
        let upperKd = Math.min(...kdValues.filter(k => k >= kd));
        if (!isFinite(upperKd)) upperKd = 100;
        let reqDomains = kdToReferringDomains[lowerKd];
        if (lowerKd !== upperKd) {
            reqDomains = Math.round(kdToReferringDomains[lowerKd] + (kd - lowerKd) * (kdToReferringDomains[upperKd] - kdToReferringDomains[lowerKd]) / (upperKd - lowerKd));
        }

        let totalCost = 0;
        for (let i = 1; i <= reqDomains; i++) {
            if (i <= 10) totalCost += 100;
            else if (i <= 50) totalCost += 100 * (1 + (i - 10) * 0.01);
            else if (i <= 200) totalCost += 100 * (1 + (40) * 0.01 + (i - 50) * 0.015);
            else totalCost += 100 * (1 + (40) * 0.01 + (150) * 0.015 + (i - 200) * 0.02);
        }

        const dailySearch = searchVolume / 30;
        const annualRevenue = dailySearch * 0.1 * 365;
        const investment = totalCost;
        let roi = 0;
        if (investment === 0) roi = annualRevenue > 0 ? 9999 : 0;
        else roi = ((annualRevenue - investment) / investment) * 100;

        document.getElementById('kdroiFormula').innerHTML = `Req Links: ${reqDomains}<br>Est. ARR: $${Math.round(annualRevenue).toLocaleString()}<br>Investment: $${Math.round(totalCost).toLocaleString()}`;
        document.getElementById('kdroiVal').textContent = roi >= 9999 ? '>9999%' : roi.toFixed(1) + '%';
        const roiRec = document.getElementById('kdroiRec');
        if (roi > 500) { roiRec.className='calc-rec rec-good'; roiRec.textContent='Excellent ROI'; }
        else if (roi > 300) { roiRec.className='calc-rec rec-good'; roiRec.textContent='Good ROI'; }
        else if (roi > 100) { roiRec.className='calc-rec rec-mid'; roiRec.textContent='Low ROI'; }
        else { roiRec.className='calc-rec rec-bad'; roiRec.textContent='Negative/Poor ROI'; }
    }

    function buildVolChart(row) {
        const ctx = document.getElementById('volChart').getContext('2d');
        if (volChartInstance) volChartInstance.destroy();
        let m = row.monthly;
        if (typeof m === 'string') { try { m = JSON.parse(m); } catch(e) { m = []; } }
        m = Array.isArray(m) ? m : [];
        if (m.length === 0) {
            ctx.canvas.style.display = 'none';
            const card = ctx.canvas.closest('.chart-card');
            if (card && !card.querySelector('.no-data-msg')) {
                const msg = document.createElement('p');
                msg.className = 'no-data-msg';
                msg.style.cssText = 'color:#64748b;font-size:0.9rem;text-align:center;padding:2rem 0;';
                msg.textContent = 'No monthly data available for this keyword.';
                card.appendChild(msg);
            }
            return;
        }
        ctx.canvas.style.display = '';
        const existing = ctx.canvas.closest('.chart-card')?.querySelector('.no-data-msg');
        if (existing) existing.remove();
        const labels = m.map(d => `${d.year}-${String(d.month).padStart(2,'0')}`);
        const data = m.map(d => d.vol);
        volChartInstance = new Chart(ctx, {
            type:'line',
            data:{
                labels,
                datasets:[{
                    label:'Search Volume',
                    data,
                    borderColor:'#60a5fa',
                    backgroundColor:'rgba(96,165,250,0.1)',
                    fill:true,
                    tension:0.4,
                    borderWidth:2,
                    pointRadius:4,
                    pointBackgroundColor:'#60a5fa'
                }]
            },
            options:{
                responsive:true,
                plugins:{ legend:{display:false} },
                scales:{
                    x:{ ticks:{color:'#94a3b8'}, grid:{color:'rgba(255,255,255,0.05)'} },
                    y:{ ticks:{color:'#94a3b8', callback:v=>v.toLocaleString()}, grid:{color:'rgba(255,255,255,0.05)'} }
                }
            }
        });
    }

    function buildRoiChart(row) {
        const ctx = document.getElementById('roiChart').getContext('2d');
        if (roiChartInstance) roiChartInstance.destroy();
        roiChartInstance = new Chart(ctx, {
            type:'doughnut',
            data:{
                labels:['Est. Annual Revenue','Investment'],
                datasets:[{
                    data:[row.annual_rev||0, row.link_cost||0],
                    backgroundColor:['rgba(96,165,250,0.8)','rgba(239,68,68,0.6)'],
                    borderColor:['#60a5fa','#ef4444'],
                    borderWidth:2
                }]
            },
            options:{
                responsive:true,
                plugins:{
                    legend:{ labels:{color:'#f8fafc', font:{size:13}} }
                }
            }
        });
    }

    function showList() {
        document.getElementById('detailView').style.display = 'none';
        document.getElementById('listView').style.display = 'block';
    }

    // Hash-based routing
    window.addEventListener('hashchange', () => {
        const hash = location.hash;
        if (!hash || hash === '#') showList();
    });


    async function fetchData() {
        const search = document.getElementById('searchInput').value.trim();
        const roiF   = document.getElementById('roiFilter').value;
        const kdF    = document.getElementById('kdFilter').value;
        const rootF  = document.getElementById('rootFilter').value;
        const batchF = document.getElementById('batchFilter').value;
        const params = new URLSearchParams({
            page: currentPage, limit: PAGE_SIZE, search,
            roi_filter: roiF, kd_filter: kdF,
            root_filter: rootF, batch_filter: batchF,
            sort: currentSort.column, dir: currentSort.desc ? 'desc' : 'asc',
        });
        try {
            const res  = await fetch('/api/data?' + params);
            if (!res.ok) throw new Error(res.status);
            const json = await res.json();
            filteredData  = json.data;
            totalRows     = json.total;
            positiveTotal = json.positive;
            if (json.batches && document.getElementById('batchFilter').options.length === 1) {
                const bs = document.getElementById('batchFilter');
                json.batches.forEach(b => { const o = document.createElement('option'); o.value=b; o.textContent=b; bs.appendChild(o); });
                const rs = document.getElementById('rootFilter');
                json.roots.forEach(r => { const o = document.createElement('option'); o.value=r; o.textContent=r; rs.appendChild(o); });
            }
            renderTable();
            renderPagination();
        } catch (err) {
            console.error(err);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="10" style="text-align:center;padding:3rem;color:#f87171"><h2>API Error</h2><p>Check that the Vercel function is deployed.</p></td></tr>';
        }
    }
    function renderPagination() {
        const pages = Math.ceil(totalRows / PAGE_SIZE);
        document.getElementById('pagination').innerHTML =
            `<button onclick="changePage(${currentPage-1})" ${currentPage<=1?'disabled':''} style="padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(30,41,59,0.7);color:white;cursor:pointer">← Prev</button>
             <span style="color:#94a3b8;font-size:0.9rem">Page ${currentPage} / ${pages} · ${totalRows.toLocaleString()} results</span>
             <button onclick="changePage(${currentPage+1})" ${currentPage>=pages?'disabled':''} style="padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(30,41,59,0.7);color:white;cursor:pointer">Next →</button>`;
    }
    function changePage(p) {
        const pages = Math.ceil(totalRows / PAGE_SIZE);
        if (p < 1 || p > pages) return;
        currentPage = p;
        fetchData();
    }
    document.addEventListener('DOMContentLoaded', () => { setupColumnMenu(); fetchData(); });

</script>
